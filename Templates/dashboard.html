<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="header">Student Dashboard</div>

<div class="container">

    <h2>{{ student.name }}</h2>
    <p>{{ reg_no }}</p>

    <div class="card-container">
        <div class="card">
            <h3>Total Paid</h3>
            <p>UGX {{ total_paid }}</p>
        </div>

        <div class="card">
            <h3>Balance</h3>
            <p>UGX {{ balance }}</p>
        </div>

        <div class="card">
            <h3>Status</h3>
            <p>{{ status }}</p>
        </div>
    </div>

    <div class="center-btn">
        <a href="/upload" class="upload-btn">📤 Upload Slip</a>
    </div>

    <h3>Transaction History</h3>

    <div class="table-container">
    <table>
        <tr>
            <th>Amount</th>
            <th>Receipt</th>
            <th>Date & Time</th>
        </tr>

        {% for t in transactions %}
        <tr>
            <td>{{ t.amount }}</td>
            <td>{{ t.receipt }}</td>
            <td>{{ t.date }}</td>
        </tr>
        {% endfor %}
    </table>
    </div>

    <a href="/logout" class="logout">Logout</a>

</div>

</body>
</html>
