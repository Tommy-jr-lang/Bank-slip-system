<!DOCTYPE html>
<html>
<head>
<title>Upload Slip</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h2>Upload Bank Slip</h2>

<p class="small">Upload clear slip image for OCR verification</p>

<form action="/submit-slip" method="POST" enctype="multipart/form-data">

<input type="file" name="slip" accept="image/*,.pdf" capture="environment" required>

<button type="submit">Scan & Upload</button>

</form>

<a href="/dashboard" class="btn">Back</a>

</div>

</body>
</html>
