<h2>Dashboard</h2>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div style="background:#d4edda;padding:10px;">
      {% for m in messages %}
        <p>{{ m }}</p>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<table class="table">
<tr>
<th>Date</th>
<th>Time</th>
<th>Status</th>
<th>Amount</th>
</tr>

{% for item in submissions %}
<tr>
<td>{{ item.date }}</td>
<td>{{ item.time }}</td>
<td>{{ item.status }}</td>
<td>{{ item.amount }}</td>
</tr>
{% endfor %}
</table>
